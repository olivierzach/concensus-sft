project:
  seed: 42
  output_dir: outputs/consensus_clean
  run_name: flan_t5_small_clean

data:
  processed_path: data/processed/training_data_sft_clean.csv
  max_source_length: 384
  max_target_length: 160
  split:
    train: 0.8
    val: 0.1
    test: 0.1

model:
  model_name: google/flan-t5-small

train:
  num_train_epochs: 5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  gradient_accumulation_steps: 1
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  logging_steps: 50
  predict_with_generate: true
  generation_max_length: 160
  fp16: false
  load_best_model_at_end: true
  metric_for_best_model: eval_rougeL
  greater_is_better: true

generation:
  num_beams: 4
  no_repeat_ngram_size: 3
  repetition_penalty: 1.1
  length_penalty: 1.0

sanity:
  enabled: true
  num_samples: 3
