project:
  seed: 42
  output_dir: outputs
  run_name: flan_t5_small_low_latency

data:
  train_path: data/processed/training_data_sft.csv
  inference_path: data/input_datasets/inference_data.csv
  text_columns:
    - query
    - title
    - abstract
  label_column: label
  max_source_length: 384
  max_target_length: 64
  split:
    train: 0.8
    val: 0.1
    test: 0.1

model:
  model_name: google/flan-t5-small

train:
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  learning_rate: 3.0e-5
  weight_decay: 0.0
  warmup_ratio: 0.03
  gradient_accumulation_steps: 1
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  logging_steps: 50
  predict_with_generate: true
  generation_max_length: 64
  fp16: false
  load_best_model_at_end: true
  metric_for_best_model: eval_rougeL
  greater_is_better: true

generation:
  num_beams: 1
  no_repeat_ngram_size: 2
  repetition_penalty: 1.05
  length_penalty: 0.9

early_stopping:
  enabled: true
  patience: 2
